name: Build Android Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag release, contoh v1.0.5
        required: true
      release_name:
        description: Nama release, boleh dikosongkan
        required: false
      prerelease:
        description: Tandai sebagai prerelease
        type: boolean
        required: false
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    environment: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.release_tag }}"
            NAME="${{ inputs.release_name }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            TAG="${GITHUB_REF_NAME}"
            NAME=""
            PRERELEASE="false"
          fi

          if [[ -z "${NAME}" ]]; then
            NAME="Release ${TAG}"
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Validate release signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > app/release-keystore.jks

          {
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
            echo "storeFile=app/release-keystore.jks"
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
          } > key.properties

          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
          echo "sdk.dir=${SDK_ROOT}" > local.properties

      - name: Build release APK and AAB
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleRelease bundleRelease

      - name: Prepare release assets
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          mkdir -p release-assets

          cp app/build/outputs/apk/release/app-release.apk "release-assets/isyara-${TAG}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "release-assets/isyara-${TAG}.aab"

          if [[ -f app/build/outputs/mapping/release/mapping.txt ]]; then
            cp app/build/outputs/mapping/release/mapping.txt "release-assets/isyara-${TAG}-mapping.txt"
          fi

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
